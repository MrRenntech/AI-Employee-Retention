<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Results - RetentionAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Sleek Professional Top Navbar -->
<nav class="top-navbar">
    <div class="nav-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
        RetentionAI
    </div>
    <div class="nav-links">
        <a href="{{ url_for('home') }}" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Dashboard
        </a>
        <a href="{{ url_for('executive') }}" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Executive Report
        </a>
        <a href="{{ url_for('logout') }}" class="btn outline" style="padding: 6px 14px; font-size: 13px;">Logout</a>
    </div>
</nav>

<div class="dashboard-container" style="max-width: 1400px;">
    
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--text-main); margin-bottom: 10px;">Batch Attrition Risk Results</h1>
        <p style="color: var(--text-muted); font-size: 15px;">Employees are computationally ranked by their attrition probability. Focus targeted retention interventions strictly on the top quartile.</p>
    </div>

    <!-- Data Table Container matching other pages -->
    <div class="data-table-container">
        <div style="width: 100%; overflow-x: auto; padding: 20px;">
            {{ tables|safe }}
        </div>
    </div>

    <div style="margin-top: 40px; text-align: center; display: flex; justify-content: center; gap: 20px;">
        <a href="/" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
            Process Another File
        </a>
    </div>
</div>

<style>
    /* Data table overrides to match the new global struct */
    table.data { width: 100%; border-collapse: collapse; text-align: left; }
    table.data td, table.data th { background: transparent !important; color: var(--text-main) !important; border-bottom: 1px solid var(--border-color) !important; padding: 12px 15px; }
    table.data th { background: rgba(0,0,0,0.3) !important; color: var(--primary) !important; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    table.data tr:nth-child(even) { background: rgba(255,255,255,0.02) !important; }
</style>

</body>
</html>

{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container" style="max-width: 1400px;">
    
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--text-main); margin-bottom: 10px;">Batch Attrition Risk Results</h1>
        <p style="color: var(--text-muted); font-size: 15px;">Employees are computationally ranked by their attrition probability. Focus targeted retention interventions strictly on the top quartile.</p>
    </div>

    <!-- Data Table Container matching other pages -->
    <div class="data-table-container">
        <div style="width: 100%; overflow-x: auto; padding: 20px;">
            {{ tables|safe }}
        </div>
    </div>

    <div style="margin-top: 40px; text-align: center; display: flex; justify-content: center; gap: 20px;">
        <a href="/" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
            Process Another File
        </a>
    </div>
</div>

<style>
    /* Data table overrides to match the new global struct */
    table.data { width: 100%; border-collapse: collapse; text-align: left; }
    table.data td, table.data th { background: transparent !important; color: var(--text-main) !important; border-bottom: 1px solid var(--border-color) !important; padding: 12px 15px; }
    table.data th { background: rgba(0,0,0,0.3) !important; color: var(--primary) !important; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
    table.data tr:nth-child(even) { background: rgba(255,255,255,0.02) !important; }
</style>
{% endblock %}

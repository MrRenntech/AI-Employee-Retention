<!DOCTYPE html>
<html>

<head>
    <title>Assessment Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">
        <h1>Attrition Assessment Result</h1>

        <div class="risk-box {{ 'high' if risk=='High Risk' else 'low' }}">
            <h2>{{ risk }}</h2>
            <p>Risk Probability: <strong>{{ probability }}%</strong></p>
        </div>

        <div class="results-grid">
            <div class="card">
                <h3>Top Risk Factors</h3>
                <ul class="feature-list">
                    {% for factor in top_features %}
                    <li>{{ factor }}</li>
                    {% endfor %}
                </ul>
            </div>

            <div class="card">
                <h3>Recommended Actions</h3>
                <ul class="recommendation-list">
                    {% for rec in recommendations %}
                    <li>{{ rec }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <div class="actions">
            <a href="/" class="btn-secondary">Back to Dashboard</a>
        </div>
    </div>

</body>

</html>

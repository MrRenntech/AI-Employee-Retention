{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container" style="max-width: 600px;">
    
    <div class="card" style="text-align: center;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" style="margin-bottom: 20px;">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line>
        </svg>
        <h2 style="color: var(--text-main); margin-bottom: 15px;">Organization-Level Analysis</h2>
        <p style="color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 30px;">
            Upload your company-wide employee dataset to generate a holistic view of organizational attrition risk, identify systemic drivers, and export comprehensive risk tables.
        </p>

        <form action="/executive" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <input type="file" name="file" required accept=".csv" style="width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.5);">
            <button type="submit" class="btn" style="width: 100%;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>
                Generate Executive Report
            </button>
        </form>
    </div>
</div>
{% endblock %}

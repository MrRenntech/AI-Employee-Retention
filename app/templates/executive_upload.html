<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard Upload - RetentionAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="hero" style="padding: 60px 20px;">
        <div class="hero-content">
            <h1>Executive Dashboard</h1>
            <div class="hero-buttons">
                <a href="/" class="btn secondary">Back to Home</a>
            </div>
        </div>
    </header>

    <div class="dashboard-container" style="max-width: 600px;">
        
        <div class="card">
            <div style="text-align: center; margin-bottom: 30px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="#1f3c88" viewBox="0 0 16 16" style="margin-bottom: 15px;">
                    <path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5H3a.5.5 0 0 1-.5-.5v-1zm3-4a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5H6a.5.5 0 0 1-.5-.5v-1zm2-4a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-1z"/>
                    <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2zM9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5v2z"/>
                </svg>
                <h2 style="color: #1f3c88;">Organization-Level Analysis</h2>
                <p style="color: #555;">Upload your company-wide employee dataset to generate a holistic view of attrition risk, identify systemic drivers, and view the top high-risk personnel.</p>
            </div>

            <form action="/executive" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <input type="file" name="file" required accept=".csv" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; max-width: 400px; box-sizing: border-box;">
                <button type="submit" class="btn" style="width: 100%; max-width: 400px; margin: 0;">Generate Executive Report</button>
            </form>
        </div>
    </div>

</body>
</html>

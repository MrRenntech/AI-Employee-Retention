<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - RetentionAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-wrapper">

    <div class="login-card card">
        <div style="margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 10px;">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="RetentionAI Logo" style="width: 32px; height: 32px; filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.8));">
            <h2 style="font-size: 24px; color: var(--text-main); margin: 0;">RetentionAI</h2>
        </div>
        
        <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">HR Executive Login</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 25px;">Sign in to access the attrition analytics platform</p>

        {% if error %}
            <p style="color: var(--risk-high); font-size: 13px; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}

        <form action="/login" method="POST" style="text-align: left;">
            <div style="position: relative; margin-bottom: 15px;">
                <svg style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <input type="text" name="username" placeholder="Username" required style="padding-left: 40px; font-size: 14px;">
            </div>
            
            <div style="position: relative; margin-bottom: 25px;">
                <svg style="position: absolute; left: 14px; top: 14px; color: var(--text-muted);" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <input type="password" name="password" placeholder="••••••••" required style="padding-left: 40px; font-size: 14px;">
            </div>

            <button type="submit" class="btn" style="width: 100%; font-size: 15px; padding: 12px; margin-bottom: 20px;">Sign In</button>
            <p style="font-size: 11px; text-align: center; color: var(--text-muted);">Demo: Use any username/password to log in</p>
        </form>
    </div>

</body>
</html>

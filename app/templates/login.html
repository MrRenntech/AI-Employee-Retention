<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - RetentionAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-wrapper">

    <div class="login-card card">
        <div style="margin-bottom: 30px; display: flex; justify-content: center; align-items: center; gap: 12px;">
            <div style="background: rgba(6, 182, 212, 0.1); padding: 8px; border-radius: 10px; display: flex;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            </div>
            <h2 style="font-size: 22px; font-weight: 700; color: var(--text-main); margin: 0; letter-spacing: 0.5px;">RetentionAI</h2>
        </div>
        
        <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #fff;">HR Executive Login</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 30px;">Sign in to access the attrition analytics platform</p>

        {% if error %}
            <p style="color: var(--risk-high); font-size: 13px; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}

        <form action="/login" method="POST" style="text-align: left;">
            <div class="login-input-wrapper">
                <input type="text" name="username" placeholder="Username" required>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            
            <div class="login-input-wrapper">
                <input type="password" name="password" placeholder="••••••••" required>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>

            <button type="submit" class="btn" style="width: 100%; font-size: 15px; margin-top: 10px; margin-bottom: 25px;">Sign In</button>
            <p style="font-size: 12px; text-align: center; color: var(--text-muted);">Demo: Use any username/password to log in</p>
        </form>
    </div>

</body>
</html>
